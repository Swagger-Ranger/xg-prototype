# 使用 resolver 实现动态 DNS 解析，避免启动时找不到 upstream
resolver 127.0.0.11 valid=30s;  # Docker 内置 DNS

server {
    listen 80;
    server_name _;

    # SPA static files
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to Java backend
    location /api/ {
        set $backend_host xg-java;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Internal API (block external access)
    location /internal/ {
        deny all;
        return 403;
    }

    # AI sidecar proxy
    location /ai/ {
        # 直接用主机名，不用变量（避免 resolver + 变量组合可能导致的 DNS 缓存问题）
        proxy_pass http://xg-python:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for AI streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # Spring Actuator (internal only)
    location /actuator/ {
        deny all;
        return 403;
    }

    # Health check endpoint for nginx itself
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
