# =============================================================
# 高校学生工作服务系统 — Docker Compose
# =============================================================
#
# 三种部署模式（通过 profile 控制）:
#
#   开发模式（仅基础设施，本机运行应用）:
#     docker compose up -d postgres redis minio
#     内存占用: ~1.2GB
#
#   轻量全栈（适合 4核8G 开发/演示机）:
#     docker compose --profile lite up -d
#     内存占用: ~3.5GB (PG 512M + Redis 128M + MinIO 256M + Java 2G + Python 512M + Nginx 64M)
#
#   标准全栈（适合 8核16G 生产/准生产）:
#     docker compose --profile full up -d
#     内存占用: ~7.5GB (PG 1.5G + Redis 384M + MinIO 512M + Java 4G + Python 1G + Nginx 128M + Prometheus 256M + Grafana 256M)
#
# =============================================================

services:

  # ─── 基础设施（始终启动）───

  postgres:
    image: pgvector/pgvector:pg15
    container_name: xg-postgres
    environment:
      POSTGRES_DB: xg1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres123}
      # 根据可用内存自动调优
      POSTGRES_SHARED_BUFFERS: ${PG_SHARED_BUFFERS:-256MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${PG_EFFECTIVE_CACHE:-512MB}
      POSTGRES_WORK_MEM: ${PG_WORK_MEM:-4MB}
      POSTGRES_MAINTENANCE_WORK_MEM: ${PG_MAINT_MEM:-64MB}
    command: >
      postgres
        -c shared_buffers=${PG_SHARED_BUFFERS:-256MB}
        -c effective_cache_size=${PG_EFFECTIVE_CACHE:-512MB}
        -c work_mem=${PG_WORK_MEM:-4MB}
        -c maintenance_work_mem=${PG_MAINT_MEM:-64MB}
        -c max_connections=100
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=1000
        -c logging_collector=on
        -c log_directory=/var/log/postgresql
        -c log_filename='postgresql-%Y-%m-%d_%H%M%S.log'
        -c log_rotation_age=1d
        -c log_rotation_size=100MB
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
      - /data/logs/postgres:/var/log/postgresql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${PG_MEM_LIMIT:-1G}
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: xg-redis
    command: >
      redis-server
        --requirepass ${REDIS_PASS:-redis123}
        --appendonly yes
        --maxmemory ${REDIS_MAXMEM:-128mb}
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-256M}
    logging:
      driver: "local"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: xg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEM_LIMIT:-256M}
    networks:
      - backend

  # ─── 应用服务（lite 或 full profile）───

  xg-java:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.java
    container_name: xg-java
    profiles: ["lite", "full"]
    environment:
      JAVA_OPTS: "${JAVA_OPTS:--Xms512m -Xmx1536m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication}"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prod}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: xg1
      DB_USER: postgres
      DB_PASS: ${DB_PASS:-postgres123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS:-redis123}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      AI_SIDECAR_URL: http://xg-python:8000
      AI_INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN:-change-me-in-production}
      SUPERADMIN_INITIAL_PASSWORD: ${SUPERADMIN_INITIAL_PASSWORD:-changeme-strong-password-123}
      # 日志配置：输出到文件（Spring Boot 格式）
      LOGGING_FILE_NAME: /app/logs/application.log
      # 时区配置
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - /data/logs/java:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/usr/share/zoneinfo/Asia/Shanghai:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${JAVA_MEM_LIMIT:-2G}
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend

  xg-python:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.python
    container_name: xg-python
    profiles: ["lite", "full"]
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASS:-postgres123}@postgres:5432/xg1
      REDIS_URL: redis://:${REDIS_PASS:-redis123}@redis:6379/1
      JAVA_BASE_URL: http://xg-java:8080
      INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN:-change-me-in-production}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      WORKERS: ${PYTHON_WORKERS:-1}
      # 日志配置
      LOG_LEVEL: INFO
      LOG_FILE: /app/logs/application.log
    ports:
      - "8000:8000"
    volumes:
      - /data/logs/python:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${PYTHON_MEM_LIMIT:-512M}
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: xg-nginx
    profiles: ["lite", "full"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /data/logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      xg-java:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend

  # ─── 监控（仅 full profile）───

  prometheus:
    image: prom/prometheus:latest
    container_name: xg-prometheus
    profiles: ["full"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=1GB'
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: xg-grafana
    profiles: ["full"]
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin123}
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - backend

volumes:
  pg_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
