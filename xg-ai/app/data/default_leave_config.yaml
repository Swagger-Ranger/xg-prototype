# 请销假规则的"建议默认配置"
#
# 数据来源：参考某高校 wiseedu 学生请假管理系统真实截图整理（2026-05）。
# 已剔除：因私请假、出校门请假（用户决定不启用）。
# 保留：事假 / 病假 / 婚假 / 因公外出 / 本科生外出实习 / 晚归申请。
#
# 说明：
# 1. 这是"建议默认"，不是教育部规定。教育部第 41 号令仅规定单学期请假累
#    计 ≤ 学期总学时 1/3（超过即触发休学），无具体假别天数限制。
# 2. 老师可以直接采用、也可以基于此微调；最终需按贵校实际规章定。
# 3. 改这份文件不需要重启代码，sidecar 读 mtime 缓存。
#
# 审批链分档语义：tiers 按 maxDays 升序排列，学生请假天数 ≤ 当前档 maxDays
# 即落入该档；最后一档 maxDays=null 表示"不限"，对应区间是 [上一档+,∞)。
# UI 会以"0-2 / 2-4 / 4-7 / 7-28"区间形式展示给老师。

leaveTypes:
  - code: personal
    name: 事假
    enabled: true
    maxDays: 28          # 图1：事假最长 28 天（7-28 天档）
    proof:
      required: optional
    approvalChain:
      - { maxDays: 2, roles: [class_master] }                                                 # 0-2 天 班主任
      - { maxDays: 4, roles: [class_master, counselor] }                                      # 2-4 天 +辅导员
      - { maxDays: 7, roles: [class_master, counselor, college_secretary] }                   # 4-7 天 +学院/书院
      - { maxDays: 28, roles: [class_master, counselor, college_secretary, school_admin] }    # 7-28 天 +学校管理员

  - code: sick
    name: 病假
    enabled: true
    # maxDays 不设：图2 显示 "8-不限"，故病假总上限为不限
    proof:
      required: required   # 图2：病假必填材料
    approvalChain:
      - { maxDays: 3, roles: [counselor] }                                                    # 1-3 天 辅导员
      - { maxDays: 7, roles: [counselor, college_secretary] }                                 # 4-7 天 +学院/书院
      - { maxDays: null, roles: [counselor, college_secretary, school_admin] }                # 8 天以上 +学校管理员

  - code: marriage
    name: 婚假
    enabled: true
    maxDays: 15           # 图2：婚假 0-15 天
    proof:
      required: optional
    approvalChain:
      - { maxDays: 15, roles: [counselor, college_secretary] }                                # 0-15 天 辅导员+学院/书院

  - code: official
    name: 因公外出
    enabled: true
    # maxDays 不设：图1 显示因公外出无天数分段限制
    proof:
      required: required   # 图1：因公外出必填说明材料
    approvalChain:
      - { maxDays: null, roles: [class_master, counselor, college_secretary] }                # 不限 班主任+辅导员+学院/书院

  - code: internship
    name: 本科生外出实习
    enabled: true
    # maxDays 不设：图2 显示 "2-不限"
    proof:
      required: optional
    approvalChain:
      - { maxDays: 2, roles: [counselor] }                                                    # 0-2 天 辅导员
      - { maxDays: null, roles: [counselor, college_secretary] }                              # 2 天以上 +学院/书院

  - code: late_return
    name: 晚归申请
    enabled: true
    maxDays: 1            # 图2：晚归 0-1 天
    proof:
      required: optional
    approvalChain:
      - { maxDays: 1, roles: [class_master] }                                                 # 0-1 天 班主任
