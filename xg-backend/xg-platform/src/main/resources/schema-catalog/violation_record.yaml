table: violation_record
alias: v
description: 学生违纪记录
indexes:
  - [tenant_id, student_id, occurred_at]
  - [category]
join_keys:
  student: { fk: student_id, table: sys_user, "on": id }
  student_profile: { fk: student_id, table: student_profile, "on": user_id }
columns:
  - { name: id,            type: bigint,    label: 违纪 ID }
  - { name: student_id,    type: bigint,    label: 学生 user_id }
  - { name: student_name,  type: text,      label: 学生姓名 }
  - { name: category,      type: text,      label: 违纪类型, aliases: [类型, 类目], indexed: true }
  - { name: occurred_at,   type: timestamp, label: 发生时间, aliases: [发生时间] }
  - { name: location,      type: text,      label: 地点 }
  - { name: description,   type: text,      label: 描述, sensitive: false }
  - { name: recorder_id,   type: bigint,    label: 记录人 user_id }
  - { name: recorder_name, type: text,      label: 记录人姓名 }
  - { name: punishment_id, type: bigint,    label: 处分 ID }
  - { name: created_at,    type: timestamp, label: 录入时间 }
  - { name: updated_at,    type: timestamp, label: 更新时间 }
  - { name: deleted_at,    type: timestamp, label: 软删时间 }
role_scope:
  dean: "EXISTS (SELECT 1 FROM student_profile sp WHERE sp.user_id = v.student_id AND sp.college = :owner_college)"
  counselor: "EXISTS (SELECT 1 FROM student_profile sp WHERE sp.user_id = v.student_id AND sp.class_id IN (:counselor_classes))"
  class_master: "EXISTS (SELECT 1 FROM student_profile sp WHERE sp.user_id = v.student_id AND sp.class_id IN (:counselor_classes))"
  student_affairs_director: ""
  school_admin: ""
  super_admin: ""
  student: "v.student_id = :owner_id"
