table: leave_request
alias: lr
description: 学生请假申请记录(每条请假一行,含状态机)
indexes:
  - [tenant_id, student_id, status]
  - [start_time]
  - [status, created_at]
join_keys:
  student: { fk: student_id, table: sys_user, "on": id }
  student_profile: { fk: student_id, table: student_profile, "on": user_id }
  workflow_instance: { fk: workflow_instance_id, table: workflow_instance, "on": id }
columns:
  - { name: id,                   type: bigint,    label: 请假 ID }
  - { name: student_id,           type: bigint,    label: 学生 user_id }
  - { name: student_name,         type: text,      label: 学生姓名 }
  - { name: leave_type_code,      type: text,      label: 假别 code, aliases: [假别], indexed: true }
  - { name: leave_type_name,      type: text,      label: 假别名称 }
  - { name: start_time,           type: timestamp, label: 起始时间, aliases: [开始时间, 起始] }
  - { name: end_time,             type: timestamp, label: 结束时间 }
  - { name: duration_days,        type: decimal,   label: 请假天数, aliases: [天数, 时长] }
  - { name: reason,               type: text,      label: 请假原因, aliases: [原因, 事由] }
  - { name: status,               type: text,      label: 状态,    indexed: true, enum: [draft, pending, approved, rejected, cancelled, cancel_pending, pending_manual_return] }
  - { name: workflow_instance_id, type: bigint,    label: 工作流实例 ID }
  - { name: submitted_by,         type: bigint,    label: 提交人 user_id }
  - { name: is_proxy,             type: boolean,   label: 是否代提交 }
  - { name: cancel_time,          type: timestamp, label: 实际销假时间 }
  - { name: cancelled_by,         type: bigint,    label: 销假人 }
  - { name: created_at,           type: timestamp, label: 创建时间 }
  - { name: updated_at,           type: timestamp, label: 更新时间 }
  - { name: deleted_at,           type: timestamp, label: 软删时间 }
  # form_data / attachments / ai_draft 是 JSONB,不暴露给 NL→SQL —— 强类型聚合用不上。
  # 真要查 JSONB 走专门 strategy / 视图,不放白名单。
# 角色 scope 通过 student_profile 间接做:dean 看本院学生的请假。
# 这里仅声明 student 自查规则,跨学院 scope 由 QueryGuard 用 EXISTS 注入:
#   WHERE EXISTS (SELECT 1 FROM student_profile sp_scope
#                 WHERE sp_scope.user_id = lr.student_id AND sp_scope.<role_scope_clause>)
role_scope:
  dean: "EXISTS (SELECT 1 FROM student_profile sp WHERE sp.user_id = lr.student_id AND sp.college = :owner_college)"
  counselor: "EXISTS (SELECT 1 FROM student_profile sp WHERE sp.user_id = lr.student_id AND sp.class_id IN (:counselor_classes))"
  class_master: "EXISTS (SELECT 1 FROM student_profile sp WHERE sp.user_id = lr.student_id AND sp.class_id IN (:counselor_classes))"
  student_affairs_director: ""
  school_admin: ""
  super_admin: ""
  student: "lr.student_id = :owner_id"
