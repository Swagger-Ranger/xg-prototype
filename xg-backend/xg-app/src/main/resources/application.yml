server:
  port: 8080

spring:
  application:
    name: xg-backend
  jackson:
    property-naming-strategy: SNAKE_CASE
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xg1}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      data-source-properties:
        assumeMinServerVersion: 9.0
        reWriteBatchedInserts: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:redis123}
  flyway:
    enabled: true
    locations: classpath:db/migration/public
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"
      id-type: assign_id

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:xg-files}

# AI Sidecar
ai:
  sidecar:
    base-url: ${AI_SIDECAR_URL:http://localhost:8000}
    timeout: 5000
    internal-token: ${AI_INTERNAL_TOKEN:dev-internal-token}

# Sa-Token
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
