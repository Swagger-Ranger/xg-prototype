server:
  port: 8080

spring:
  application:
    name: xg-backend
  jackson:
    property-naming-strategy: SNAKE_CASE
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xg1}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      data-source-properties:
        assumeMinServerVersion: 9.0
        reWriteBatchedInserts: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:redis123}
  flyway:
    enabled: true
    locations: classpath:db/migration/public
    baseline-on-migrate: true
  servlet:
    multipart:
      # Defaults are 1MB/file and 10MB/request — unusable for phone photos.
      max-file-size: 10MB
      max-request-size: 30MB

mybatis-plus:
  type-handlers-package: com.xg.common.mybatis.global
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"
      id-type: assign_id

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket: ${MINIO_BUCKET:xg-files}

# AI Sidecar
ai:
  sidecar:
    base-url: ${AI_SIDECAR_URL:http://localhost:8000}
    timeout: 60000
    internal-token: ${AI_INTERNAL_TOKEN:dev-internal-token}

# 高德天气 API (start-of-leave reminder enrichment).
# Leave empty to disable: weather segment is silently skipped, reminders still go out.
# Free key: https://lbs.amap.com/api/webservice/guide/create-project/get-key
weather:
  amap:
    key: ${WEATHER_AMAP_KEY:}

# Sa-Token
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

xg:
  rbac:
    # 关闭后退回旧行为：只按 X-Tenant-Id header 决定 schema，不做 session 绑定校验。
    # 上线观测异常时可临时置 false 兜底（RBAC 落地方案 §11 回滚策略）。
    tenant-session-guard:
      enabled: true
    workflow:
      # 灰度开关(RBAC 落地方案 §5.9.4 / §11)。create/update 始终 hard fail;
      # 下面两项确认存量定义/实例干净(跑 assignee-dry-run 无未知组合)后再翻 true。
      publish-assignee-hard-fail: false
      empty-assignee-fail-fast: false

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
